<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HedgeNow Multi-Asset Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- React & ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050915;
      color: #f5f5f5;
    }
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 {
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #9ca3af;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }
    .controls label {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-right: 4px;
    }
    select {
      background: #0b1220;
      color: #f9fafb;
      border: 1px solid #1f2937;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.9rem;
    }
    .table-container {
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: radial-gradient(circle at top left, #111827, #020617);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead {
      background: #020617;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #111827;
    }
    th {
      font-weight: 500;
      color: #9ca3af;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }
    tbody tr:hover {
      background: rgba(148, 163, 184, 0.08);
    }
    .asset-name {
      font-weight: 500;
    }
    .asset-class-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid #374151;
      color: #9ca3af;
    }
    .metric-positive {
      color: #4ade80;
    }
    .metric-negative {
      color: #f97373;
    }
    .metric-muted {
      color: #9ca3af;
    }
    .detail-row td {
      background: #020617;
      border-bottom: 1px solid #111827;
    }
    .detail-box {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding-top: 4px;
    }
    .detail-item-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 2px;
    }
    .detail-item-value {
      font-size: 0.9rem;
      color: #e5e7eb;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(234, 179, 8, 0.08);
      border: 1px solid rgba(234, 179, 8, 0.4);
      color: #facc15;
      margin-left: 6px;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .header-right {
      font-size: 0.75rem;
      color: #6b7280;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid #374151;
      color: #9ca3af;
      margin-left: 6px;
    }
    @media (max-width: 768px) {
      th:nth-child(4),
      th:nth-child(5),
      th:nth-child(6),
      td:nth-child(4),
      td:nth-child(5),
      td:nth-child(6) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- Mock HedgeNow Data Library snapshot (extend/replace with real data as needed) ---
    const HEDGENOW_DATA = [
      {
        id: "UAE_RES",
        name: "UAE Residential Real Estate",
        class: "real_estate",
        sixYearReturn: 1.98,      // +198%
        annualisedReturn: 0.234,  // 23.4%
        sharpe: 1.46,
        maxDrawdown: -0.19,
        ytd2026: 0.06,
        headline: "Dubai’s residential market led global risk-adjusted performance over the last cycle.",
        liquidity: "Low–Medium (quarterly to annual liquidity, depending on structure)",
        minInvestment: "Typically USD 250k+ via funds or direct structures",
        dataSource: "Dubai Land Department, JLL, HedgeNow composite indices"
      },
      {
        id: "GLD",
        name: "Gold (GLD)",
        class: "commodity",
        sixYearReturn: 1.12,
        annualisedReturn: 0.156,
        sharpe: 1.04,
        maxDrawdown: -0.21,
        ytd2026: 0.02,
        headline: "Gold remained the global safe-haven anchor through inflation and rate volatility.",
        liquidity: "High (daily via ETFs and futures)",
        minInvestment: "No formal minimum via listed products",
        dataSource: "GLD ETF, Bloomberg, HedgeNow calculations"
      },
      {
        id: "AAPL",
        name: "Apple (AAPL)",
        class: "equity",
        sixYearReturn: 2.60,
        annualisedReturn: 0.281,
        sharpe: 0.84,
        maxDrawdown: -0.33,
        ytd2026: 0.04,
        headline: "Mega-cap tech compounded steadily with manageable drawdowns and modest yield.",
        liquidity: "High (daily via global exchanges)",
        minInvestment: "No formal minimum via listed shares",
        dataSource: "NASDAQ, Bloomberg, HedgeNow calculations"
      },
      {
        id: "SPY",
        name: "S&P 500 (SPY)",
        class: "equity",
        sixYearReturn: 1.58,
        annualisedReturn: 0.204,
        sharpe: 0.82,
        maxDrawdown: -0.24,
        ytd2026: 0.03,
        headline: "Broad U.S. equities delivered resilient, diversified growth through multiple regimes.",
        liquidity: "High (daily via ETFs and futures)",
        minInvestment: "No formal minimum via listed products",
        dataSource: "SPY ETF, Bloomberg, HedgeNow calculations"
      },
      {
        id: "ALGO_HF",
        name: "Algo Crypto Hedge Funds",
        class: "fund",
        sixYearReturn: 3.90,
        annualisedReturn: 0.364,
        sharpe: 0.74,
        maxDrawdown: -0.39,
        ytd2026: 0.08,
        headline: "Systematic crypto strategies captured upside with materially lower risk than raw tokens.",
        liquidity: "Monthly or quarterly, subject to fund terms",
        minInvestment: "Typically USD 100k–1m depending on vehicle",
        dataSource: "VisionTrack Quant Index, manager reports, HedgeNow estimates"
      },
      {
        id: "BTC",
        name: "Bitcoin (BTC-USD)",
        class: "crypto",
        sixYearReturn: 11.80,
        annualisedReturn: 0.624,
        sharpe: 0.97,
        maxDrawdown: -0.74,
        ytd2026: 0.12,
        headline: "Bitcoin remained the core asymmetric bet in digital assets, with deep but recoverable drawdowns.",
        liquidity: "High (24/7 via major exchanges)",
        minInvestment: "No formal minimum via exchanges or ETPs",
        dataSource: "Binance, Coinbase, HedgeNow calculations"
      },
      {
        id: "ETH",
        name: "Ethereum (ETH-USD)",
        class: "crypto",
        sixYearReturn: 10.20,
        annualisedReturn: 0.591,
        sharpe: 0.78,
        maxDrawdown: -0.78,
        ytd2026: 0.10,
        headline: "Ethereum combined smart-contract leadership with high volatility and deep cycles.",
        liquidity: "High (24/7 via major exchanges)",
        minInvestment: "No formal minimum via exchanges or ETPs",
        dataSource: "Binance, Coinbase, HedgeNow calculations"
      },
      {
        id: "MARA",
        name: "Crypto Mining (MARA)",
        class: "equity",
        sixYearReturn: 31.80,
        annualisedReturn: 0.874,
        sharpe: 0.72,
        maxDrawdown: -0.91,
        ytd2026: 0.18,
        headline: "Mining equities amplified crypto cycles, delivering extreme upside and near-total drawdowns.",
        liquidity: "High (daily via U.S. exchanges)",
        minInvestment: "No formal minimum via listed shares",
        dataSource: "NASDAQ, Bloomberg, HedgeNow calculations"
      },
      {
        id: "UAE_COM",
        name: "UAE Commercial Real Estate",
        class: "real_estate",
        sixYearReturn: 1.24,
        annualisedReturn: 0.164,
        sharpe: 0.74,
        maxDrawdown: -0.27,
        ytd2026: 0.05,
        headline: "Income-focused commercial assets offered high yields with moderate capital appreciation.",
        liquidity: "Low–Medium (fund or REIT structures)",
        minInvestment: "Typically USD 250k+ via funds or REIT blocks",
        dataSource: "Emirates REIT, JLL, HedgeNow composite indices"
      },
      {
        id: "VNQ",
        name: "U.S. REITs (VNQ)",
        class: "real_estate",
        sixYearReturn: 0.44,
        annualisedReturn: 0.072,
        sharpe: 0.16,
        maxDrawdown: -0.33,
        ytd2026: 0.01,
        headline: "U.S. listed real estate lagged as rates stayed elevated, with dividends cushioning the path.",
        liquidity: "High (daily via ETFs)",
        minInvestment: "No formal minimum via listed products",
        dataSource: "VNQ ETF, Bloomberg, HedgeNow calculations"
      },
      {
        id: "USO",
        name: "Oil (USO)",
        class: "commodity",
        sixYearReturn: 1.32,
        annualisedReturn: 0.176,
        sharpe: 0.39,
        maxDrawdown: -0.36,
        ytd2026: 0.02,
        headline: "Oil remained a volatile macro and geopolitical hedge with strong cyclical swings.",
        liquidity: "High (daily via ETFs and futures)",
        minInvestment: "No formal minimum via listed products",
        dataSource: "USO ETF, Bloomberg, HedgeNow calculations"
      },
      {
        id: "TLT",
        name: "Long-Term Treasuries (TLT)",
        class: "bond",
        sixYearReturn: -0.28,
        annualisedReturn: -0.064,
        sharpe: -0.52,
        maxDrawdown: -0.31,
        ytd2026: -0.01,
        headline: "Long-duration bonds remained structurally challenged in a higher-for-longer rate regime.",
        liquidity: "High (daily via ETFs)",
        minInvestment: "No formal minimum via listed products",
        dataSource: "TLT ETF, Bloomberg, HedgeNow calculations"
      }
    ];

    const SORT_OPTIONS = [
      { value: "sixYearReturn", label: "6-Year Total Return" },
      { value: "annualisedReturn", label: "Annualised Return" },
      { value: "sharpe", label: "Sharpe Ratio" },
      { value: "safest", label: "Safest by Max Drawdown" },
      { value: "ytd2026", label: "2026 YTD Return" }
    ];

    const ASSET_CLASS_LABELS = {
      crypto: "Crypto",
      equity: "Equity",
      real_estate: "Real Estate",
      commodity: "Commodity",
      bond: "Bond",
      fund: "Fund"
    };

    function formatPct(x) {
      if (x === null || x === undefined || isNaN(x)) return "–";
      return (x * 100).toFixed(1) + "%";
    }

    function formatRatio(x) {
      if (x === null || x === undefined || isNaN(x)) return "–";
      return x.toFixed(2);
    }

    function HedgeNowTracker() {
      const [sortBy, setSortBy] = useState("sharpe");
      const [assetClassFilter, setAssetClassFilter] = useState("all");
      const [expandedId, setExpandedId] = useState(null);

      const assetClasses = useMemo(() => {
        const set = new Set(HEDGENOW_DATA.map(a => a.class));
        return ["all", ...Array.from(set)];
      }, []);

      const filtered = useMemo(() => {
        return HEDGENOW_DATA.filter(a =>
          assetClassFilter === "all" ? true : a.class === assetClassFilter
        );
      }, [assetClassFilter]);

      const sorted = useMemo(() => {
        const arr = [...filtered];
        arr.sort((a, b) => {
          if (sortBy === "safest") {
            // safest = highest (least negative) maxDrawdown
            return b.maxDrawdown - a.maxDrawdown;
          } else {
            return (b[sortBy] ?? 0) - (a[sortBy] ?? 0);
          }
        });
        return arr;
      }, [filtered, sortBy]);

      const handleRowClick = (id) => {
        setExpandedId(prev => (prev === id ? null : id));
      };

      return (
        <div className="app-container">
          <div className="header-row">
            <div>
              <h1>HedgeNow Multi-Asset Tracker</h1>
              <div className="subtitle">
                Interactive view of 6-year performance, risk-adjusted metrics, and liquidity profiles across key asset classes.
              </div>
            </div>
            <div className="header-right">
              As of: <span className="pill">March 2026</span>
            </div>
          </div>

          <div className="controls">
            <div>
              <label>Sort by</label>
              <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
                {SORT_OPTIONS.map(opt => (
                  <option key={opt.value} value={opt.value}>{opt.label}</option>
                ))}
              </select>
            </div>
            <div>
              <label>Asset class</label>
              <select
                value={assetClassFilter}
                onChange={e => setAssetClassFilter(e.target.value)}
              >
                {assetClasses.map(cls => (
                  <option key={cls} value={cls}>
                    {cls === "all" ? "All Classes" : ASSET_CLASS_LABELS[cls] || cls}
                  </option>
                ))}
              </select>
            </div>
          </div>

          <div className="table-container">
            <table>
              <thead>
                <tr>
                  <th>Asset</th>
                  <th>Class</th>
                  <th>6-Year Return</th>
                  <th>Annualised</th>
                  <th>Sharpe</th>
                  <th>Max Drawdown</th>
                  <th>2026 YTD</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map(asset => {
                  const isExpanded = expandedId === asset.id;
                  return (
                    <React.Fragment key={asset.id}>
                      <tr onClick={() => handleRowClick(asset.id)}>
                        <td>
                          <span className="asset-name">{asset.name}</span>
                          {asset.id === "UAE_RES" && (
                            <span className="badge">Top Risk-Adjusted</span>
                          )}
                        </td>
                        <td>
                          <span className="asset-class-pill">
                            {ASSET_CLASS_LABELS[asset.class] || asset.class}
                          </span>
                        </td>
                        <td className={asset.sixYearReturn >= 0 ? "metric-positive" : "metric-negative"}>
                          {formatPct(asset.sixYearReturn)}
                        </td>
                        <td className={asset.annualisedReturn >= 0 ? "metric-positive" : "metric-negative"}>
                          {formatPct(asset.annualisedReturn)}
                        </td>
                        <td className={asset.sharpe >= 0 ? "metric-positive" : "metric-negative"}>
                          {formatRatio(asset.sharpe)}
                        </td>
                        <td className="metric-negative">
                          {formatPct(asset.maxDrawdown)}
                        </td>
                        <td className={asset.ytd2026 >= 0 ? "metric-positive" : "metric-negative"}>
                          {formatPct(asset.ytd2026)}
                        </td>
                      </tr>
                      {isExpanded && (
                        <tr className="detail-row">
                          <td colSpan="7">
                            <div className="detail-box">
                              <div>
                                <div className="detail-item-label">Headline</div>
                                <div className="detail-item-value">{asset.headline}</div>
                              </div>
                              <div>
                                <div className="detail-item-label">Liquidity</div>
                                <div className="detail-item-value">{asset.liquidity}</div>
                              </div>
                              <div>
                                <div className="detail-item-label">Minimum Investment</div>
                                <div className="detail-item-value">{asset.minInvestment}</div>
                              </div>
                              <div>
                                <div className="detail-item-label">Data Source</div>
                                <div className="detail-item-value">{asset.dataSource}</div>
                              </div>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<HedgeNowTracker />);
  </script>
</body>
</html>
