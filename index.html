<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HedgeNow Multi-Asset Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- React & ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050915;
      color: #f5f5f5;
    }
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #050915;
    }
    .spinner {
      border: 4px solid #1f2937;
      border-top: 4px solid #4ade80;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #9ca3af;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }
    .debug-panel {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 350px;
      max-height: 300px;
      background: #0b1220;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.75rem;
      font-family: monospace;
      overflow-y: auto;
      z-index: 9999;
      display: none;
    }
    .debug-panel.show {
      display: block;
    }
    .debug-log {
      margin: 4px 0;
      padding: 4px;
      border-radius: 3px;
    }
    .debug-info {
      background: rgba(74, 222, 128, 0.1);
      color: #4ade80;
    }
    .debug-error {
      background: rgba(249, 115, 115, 0.1);
      color: #f97373;
    }
    .debug-warn {
      background: rgba(234, 179, 8, 0.1);
      color: #facc15;
    }
    .fallback-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #050915;
      padding: 24px;
      text-align: center;
    }
    .error-title {
      font-size: 2rem;
      color: #f97373;
      margin-bottom: 16px;
    }
    .error-message {
      color: #d1d5db;
      margin-bottom: 24px;
      max-width: 500px;
      line-height: 1.6;
    }
    .debug-toggle {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: #374151;
      color: #f5f5f5;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      z-index: 10000;
    }
    .debug-toggle:hover {
      background: #4b5563;
    }
    h1 {
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #9ca3af;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
    }
    .controls label {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-right: 4px;
    }
    select {
      background: #0b1220;
      color: #f9fafb;
      border: 1px solid #1f2937;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.9rem;
    }
    .table-container {
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: radial-gradient(circle at top left, #111827, #020617);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead {
      background: #020617;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #111827;
    }
    th {
      font-weight: 500;
      color: #9ca3af;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    tbody tr {
      cursor: pointer;
      transition: background 0.15s ease;
    }
    tbody tr:hover {
      background: rgba(148, 163, 184, 0.08);
    }
    .asset-name {
      font-weight: 500;
    }
    .asset-class-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid #374151;
      color: #9ca3af;
    }
    .metric-positive {
      color: #4ade80;
    }
    .metric-negative {
      color: #f97373;
    }
    .metric-muted {
      color: #9ca3af;
    }
    .detail-row td {
      background: #020617;
      border-bottom: 1px solid #111827;
    }
    .detail-box {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding-top: 4px;
    }
    .detail-item-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 2px;
    }
    .detail-item-value {
      font-size: 0.9rem;
      color: #e5e7eb;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(234, 179, 8, 0.08);
      border: 1px solid rgba(234, 179, 8, 0.4);
      color: #facc15;
      margin-left: 6px;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .header-right {
      font-size: 0.75rem;
      color: #6b7280;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid #374151;
      color: #9ca3af;
      margin-left: 6px;
    }
    .error-box {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #b91c1c;
      background: rgba(248, 113, 113, 0.08);
      color: #fecaca;
      font-size: 0.8rem;
    }
    @media (max-width: 768px) {
      th:nth-child(4),
      th:nth-child(5),
      th:nth-child(6),
      td:nth-child(4),
      td:nth-child(5),
      td:nth-child(6) {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <button class="debug-toggle" onclick="toggleDebugPanel()">🔧 Debug</button>
  <div id="debugPanel" class="debug-panel"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ===== DEBUG LOGGING SYSTEM =====
    const debugLogs = [];
    const MAX_LOGS = 50;

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const entry = { timestamp, message, type };
      debugLogs.push(entry);
      if (debugLogs.length > MAX_LOGS) debugLogs.shift();
      console.log(`[HN-Tracker ${type.toUpperCase()}] ${message}`);
      updateDebugPanel();
    }

    function logError(message, error = null) {
      const fullMessage = error ? `${message}: ${error.message}` : message;
      log(fullMessage, 'error');
    }

    function updateDebugPanel() {
      const panel = document.getElementById('debugPanel');
      panel.innerHTML = debugLogs.map(entry => `
        <div class="debug-log debug-${entry.type}">
          <strong>${entry.timestamp}</strong> [${entry.type.toUpperCase()}] ${entry.message}
        </div>
      `).join('');
    }

    window.toggleDebugPanel = function() {
      const panel = document.getElementById('debugPanel');
      panel.classList.toggle('show');
    };

    // ===== DATA CONFIG =====
    const DATA_CONFIG = {
      mode: "inline",
      remoteUrl: "/data/hedgenow_master.json",
      apiUrl: "https://example.com/hedgenow-data.json"
    };

    // ===== INLINE DATA =====

        dataSource: "VisionTrack Quant Index, manager reports, HedgeNow estimates"
      },
      {

        name: "Bitcoin (BTC-USD)",
        class: "crypto",

      },
      {

        ytd2026: 0.02,
        headline: "Oil remained a volatile macro and geopolitical hedge with strong cyclical swings.",
        liquidity: "High (daily via ETFs and futures)",
        minInvestment: "No formal minimum via listed products",
        dataSource: "USO ETF, Bloomberg, HedgeNow calculations"
      },
      {

        class: "bond",

        headline: "Long-duration bonds remained structurally challenged in a higher-for-longer rate regime.",
        liquidity: "High (daily via ETFs)",

        dataSource: "TLT ETF, Bloomberg, HedgeNow calculations"
      }
    ];

    const SORT_OPTIONS = [
      { value: "sixYearReturn", label: "6-Year Total Return" },
      { value: "annualisedReturn", label: "Annualised Return" },
      { value: "sharpe", label: "Sharpe Ratio" },
      { value: "safest", label: "Safest by Max Drawdown" },
      { value: "ytd2026", label: "2026 YTD Return" }
    ];

    const ASSET_CLASS_LABELS = {
      crypto: "Crypto",
      equity: "Equity",
      real_estate: "Real Estate",
      commodity: "Commodity",
      bond: "Bond",
      fund: "Fund"
    };

    function formatPct(x) {
      if (x === null || x === undefined || isNaN(x)) return "–";
      return (x * 100).toFixed(1) + "%";
    }

    function formatRatio(x) {
      if (x === null || x === undefined || isNaN(x)) return "–";
      return x.toFixed(2);
    }

    // ===== LOADING COMPONENT =====
    function LoadingScreen() {
      return (
        <div className="loading-screen">
          <div className="spinner"></div>
          <div className="loading-text">⏳ Loading HedgeNow Tracker...</div>
          <div style={{ color: '#6b7280', fontSize: '0.85rem' }}>Press 🔧 Debug to view logs</div>
        </div>
      );
    }

    // ===== ERROR BOUNDARY =====
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        logError("React Error Boundary caught error", error);
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        logError("Component stack", new Error(errorInfo.componentStack));
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="fallback-screen">
              <div className="error-title">⚠️ Error Loading Tracker</div>
              <div className="error-message">
                <p>Something went wrong while rendering the tracker.</p>
                <p><strong>Error:</strong> {this.state.error?.message}</p>
                <p>Please try refreshing the page or check the debug logs.</p>
              </div>
              <button 
                className="debug-toggle" 
                onClick={() => toggleDebugPanel()}
                style={{ position: 'static', marginTop: '20px' }}
              >
                View Debug Logs
              </button>
            </div>
          );
        }

        return this.props.children;
      }
    }

    // ===== MAIN TRACKER COMPONENT =====
    function HedgeNowTracker() {
      const [data, setData] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [sortBy, setSortBy] = useState("sharpe");
      const [assetClassFilter, setAssetClassFilter] = useState("all");
      const [expandedId, setExpandedId] = useState(null);

      useEffect(() => {
        async function loadData() {
          try {
            log("Initializing data load...");
            setLoading(true);
            setError(null);

            let mode = DATA_CONFIG.mode;
            log(`Data mode: ${mode}`);

            if (mode === "auto") {
              mode = "remote";
              log("Auto mode detected, trying remote...");
            }

            if (mode === "inline") {
              log(`Loading ${INLINE_DATA.length} assets from inline data`);
              setData(INLINE_DATA);
              setLoading(false);
              log("✅ Data loaded successfully");
              return;
            }

            if (mode === "remote") {
              if (!DATA_CONFIG.remoteUrl) throw new Error("remoteUrl not configured");
              log(`Fetching from: ${DATA_CONFIG.remoteUrl}`);
              const res = await fetch(DATA_CONFIG.remoteUrl);
              if (!res.ok) throw new Error(`HTTP ${res.status}: Remote JSON fetch failed`);
              const json = await res.json();
              const arr = Array.isArray(json) ? json : json.data;
              if (!Array.isArray(arr)) throw new Error("Remote JSON format invalid");
              log(`Loaded ${arr.length} assets from remote`);
              setData(arr);
              setLoading(false);
              return;
            }

            if (mode === "api") {
              if (!DATA_CONFIG.apiUrl) throw new Error("apiUrl not configured");
              log(`Fetching from API: ${DATA_CONFIG.apiUrl}`);
              const res = await fetch(DATA_CONFIG.apiUrl);
              if (!res.ok) throw new Error(`HTTP ${res.status}: API fetch failed`);
              const json = await res.json();
              const arr = Array.isArray(json) ? json : json.data;
              if (!Array.isArray(arr)) throw new Error("API JSON format invalid");
              log(`Loaded ${arr.length} assets from API`);
              setData(arr);
              setLoading(false);
              return;
            }

            log("Fallback: using inline data");
            setData(INLINE_DATA);
            setLoading(false);
          } catch (e) {
            logError("Data loading failed", e);
            setError(e.message || "Failed to load data");
            setData(INLINE_DATA);
            log(`Fallback: using ${INLINE_DATA.length} inline assets`);
            setLoading(false);
          }
        }
        loadData();
      }, []);

      const assetClasses = useMemo(() => {
        const set = new Set(data.map(a => a.class));
        return ["all", ...Array.from(set)];
      }, [data]);

      const filtered = useMemo(() => {
        return data.filter(a =>
          assetClassFilter === "all" ? true : a.class === assetClassFilter
        );
      }, [assetClassFilter, data]);

      const sorted = useMemo(() => {
        const arr = [...filtered];
        arr.sort((a, b) => {
          if (sortBy === "safest") {
            return (b.maxDrawdown ?? -1) - (a.maxDrawdown ?? -1);
          } else {
            return (b[sortBy] ?? 0) - (a[sortBy] ?? 0);
          }
        });
        return arr;
      }, [filtered, sortBy]);

      const handleRowClick = (id) => {
        setExpandedId(prev => (prev === id ? null : id));
      };

      if (loading) return <LoadingScreen />;

      return (
        <div className="app-container">
          <div className="header-row">
            <div>
              <h1>HedgeNow Multi-Asset Tracker</h1>
              <div className="subtitle">
                Interactive view of 6-year performance, risk-adjusted metrics, and liquidity profiles across key asset classes.
              </div>
            </div>
            <div className="header-right">
              As of: <span class="pill">March 2026</span>
            </div>
          </div>

          <div className="controls">
            <div>
              <label>Sort by</label>
              <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
                {SORT_OPTIONS.map(opt => (
                  <option key={opt.value} value={opt.value}>{opt.label}</option>
                ))}
              </select>
            </div>
            <div>
              <label>Asset class</label>
              <select
                value={assetClassFilter}
                onChange={e => setAssetClassFilter(e.target.value)}
              >
                {assetClasses.map(cls => (
                  <option key={cls} value={cls}>
                    {cls === "all" ? "All Classes" : ASSET_CLASS_LABELS[cls] || cls}
                  </option>
                ))}
              </select>
            </div>
          </div>

          {error && (
            <div className="error-box">
              ⚠️ Data load issue: {error}. Using inline HedgeNow snapshot as fallback.
            </div>
          )}

          <div className="table-container">
            <table>
              <thead>
                <tr>
                  <th>Asset</th>
                  <th>Class</th>
                  <th>6-Year Return</th>
                  <th>Annualised</th>
                  <th>Sharpe</th>
                  <th>Max Drawdown</th>
                  <th>2026 YTD</th>
                </tr>
              </thead>
              <tbody>
                {sorted.map(asset => {
                  const isExpanded = expandedId === asset.id;
                  return (
                    <React.Fragment key={asset.id}>
                      <tr onClick={() => handleRowClick(asset.id)}>
                        <td>
                          <span className="asset-name">{asset.name}</span>
                          {asset.id === "UAE_RES" && (
                            <span className="badge">Top Risk-Adjusted</span>
                          )}
                        </td>
                        <td>
                          <span className="asset-class-pill">
                            {ASSET_CLASS_LABELS[asset.class] || asset.class}
                          </span>
                        </td>
                        <td className={asset.sixYearReturn >= 0 ? "metric-positive" : "metric-negative"}>
                          {formatPct(asset.sixYearReturn)}
                        </td>
                        <td className={asset.annualisedReturn >= 0 ? "metric-positive" : "metric-negative"}>
                          {formatPct(asset.annualisedReturn)}
                        </td>
                        <td className={asset.sharpe >= 0 ? "metric-positive" : "metric-negative"}>
                          {formatRatio(asset.sharpe)}
                        </td>
                        <td className="metric-negative">
                          {formatPct(asset.maxDrawdown)}
                        </td>
                        <td className={asset.ytd2026 >= 0 ? "metric-positive" : "metric-negative"}>
                          {formatPct(asset.ytd2026)}
                        </td>
                      </tr>
                      {isExpanded && (
                        <tr className="detail-row">
                          <td colSpan="7">
                            <div className="detail-box">
                              <div>
                                <div className="detail-item-label">Headline</div>
                                <div className="detail-item-value">{asset.headline}</div>
                              </div>
                              <div>
                                <div className="detail-item-label">Liquidity</div>
                                <div className="detail-item-value">{asset.liquidity}</div>
                              </div>
                              <div>
                                <div className="detail-item-label">Minimum Investment</div>
                                <div className="detail-item-value">{asset.minInvestment}</div>
                              </div>
                              <div>
                                <div className="detail-item-label">Data Source</div>
                                <div className="detail-item-value">{asset.dataSource}</div>
                              </div>
                            </div>
                          </td>
                        </tr>
                      );
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ===== INITIALIZATION =====
    log("App initializing...");

    window.onerror = function(message, source, lineno, colno, error) {
      logError(`Global JS Error at ${source}:${lineno}:${colno}`, new Error(message));
    };

    window.addEventListener('unhandledrejection', function(event) {
      logError("Unhandled Promise Rejection", event.reason);
    });

    function initApp() {
      try {
        const root = document.getElementById("root");
        if (!root) {
          throw new Error("Root element not found");
        }

        log("React and ReactDOM available");
        log("Creating React root...");

        const reactRoot = ReactDOM.createRoot(root);
        log("Rendering app...");

        reactRoot.render(
          <ErrorBoundary>
            <HedgeNowTracker />
          </ErrorBoundary>
        );
        log("✅ App rendered successfully");
      } catch (e) {
        logError("Critical initialization error", e);
        const root = document.getElementById("root");
        if (root) {
          root.innerHTML = `
            <div class="fallback-screen">
              <div class="error-title">⚠️ Failed to Initialize</div>
              <div class="error-message">
                <p>${e.message}</p>
                <p>Press 🔧 Debug to see full error logs</p>
              </div>
            </div>
          `;
        }
      }
    }

    if (document.readyState === "loading") {
      log("Waiting for DOMContentLoaded...");
      document.addEventListener("DOMContentLoaded", initApp);
    } else {
      log("DOM already loaded, initializing...");
      initApp();
    }

    // Fallback timeout
    setTimeout(() => {
      if (document.getElementById("root").innerHTML.includes("Loading")) {
        logError("Initialization timeout - React may not have loaded");
      }
    }, 5000);
  </script>
</body>
</html>
