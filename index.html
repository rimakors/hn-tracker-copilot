<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HN Tracker Copilot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <h1>Welcome to HN Tracker Copilot</h1>
    </div>
    <script>
        // Comprehensive error handling
        window.onerror = function(message, source, lineno, colno, error) {
            console.error(`Error occurred: ${message} at ${source}:${lineno}:${colno}`);
            // Display fallback UI
            document.getElementById('app').innerHTML = '<h2>An error has occurred. Please try refreshing the page.</h2>';
        };

        // Debugging output
        console.log('App initialized.');
        // Simulate the black screen issue and handle it
        try {
            // Simulate loading process... If there is an error, it will be caught
            loadData(); // Assuming this is a function to load your app's data
        } catch (e) {
            console.error('Failed to load data:', e);
            document.getElementById('app').innerHTML = '<h2>Failed to load data. Please check your connection.</h2>';
        }

        function loadData() {
            // Simulated function for loading data
            // Could throw an error to demonstrate error handling
            throw new Error('Simulated data loading error');
        }
    </script>
</body>
</html>
