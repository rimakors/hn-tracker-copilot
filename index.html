<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HedgeNow Multi-Asset Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Minimal styling -->
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050910;
      color: #f5f5f5;
    }
    .app-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 {
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #9ca3af;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
      color: #d1d5db;
    }
    select {
      background: #0b1220;
      color: #f9fafb;
      border: 1px solid #1f2937;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.9rem;
      outline: none;
    }
    select:focus {
      border-color: #facc15;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.9rem;
    }
    thead {
      background: #020617;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #111827;
      text-align: left;
    }
    th {
      font-weight: 500;
      color: #9ca3af;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    tr.data-row {
      cursor: pointer;
      transition: background 0.15s ease;
    }
    tr.data-row:hover {
      background: #020617;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-real_estate { background: rgba(250, 204, 21, 0.1); color: #facc15; }
    .badge-crypto { background: rgba(52, 211, 153, 0.1); color: #34d399; }
    .badge-equity { background: rgba(96, 165, 250, 0.1); color: #60a5fa; }
    .badge-commodity { background: rgba(248, 250, 252, 0.06); color: #e5e7eb; }
    .badge-bond { background: rgba(248, 113, 113, 0.1); color: #f87171; }
    .badge-fund { background: rgba(129, 140, 248, 0.1); color: #818cf8; }

    .expanded-row td {
      background: #020617;
      border-bottom: 1px solid #111827;
    }
    .expanded-content {
      padding: 8px 4px 10px;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.2fr);
      gap: 12px;
      font-size: 0.85rem;
    }
    .headline {
      font-weight: 500;
      margin-bottom: 4px;
      color: #e5e7eb;
    }
    .meta-label {
      color: #9ca3af;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .meta-value {
      color: #f9fafb;
      font-size: 0.85rem;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      font-size: 0.75rem;
      color: #d1d5db;
      margin-right: 6px;
      margin-top: 4px;
    }
    .metric-positive { color: #4ade80; }
    .metric-negative { color: #f97373; }
    .metric-muted { color: #9ca3af; }
    .footer-note {
      margin-top: 18px;
      font-size: 0.75rem;
      color: #6b7280;
    }
    @media (max-width: 768px) {
      .expanded-content {
        grid-template-columns: minmax(0, 1fr);
      }
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5),
      th:nth-child(6), td:nth-child(6) {
        display: none;
      }
    }
  </style>
</head>
<body>
